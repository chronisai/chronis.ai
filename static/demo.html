<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronis — Text Demo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);--glass-hover:rgba(255,255,255,0.07);--text:#f0eeea;--muted:rgba(255,255,255,0.38);--chrome:rgba(255,255,255,0.72);--accent:#fff;--green:#4ade80;--red:#f87171;--blue:#60a5fa}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:-20vh;left:50%;transform:translateX(-50%);width:70vw;height:50vh;background:radial-gradient(ellipse,rgba(255,255,255,0.025) 0%,transparent 70%);pointer-events:none;z-index:0}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:rgba(8,8,8,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border)}
.nav-logo{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:var(--chrome);text-decoration:none}
.nav-badge{font-size:11px;letter-spacing:2px;text-transform:uppercase;background:var(--glass);border:1px solid var(--glass-border);color:var(--muted);padding:4px 12px;border-radius:20px}
.app{display:flex;flex-direction:column;height:100vh;padding-top:56px;position:relative;z-index:1}

/* Upload panel */
#upload-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px}
.panel-inner{width:100%;max-width:480px}
.panel-title{font-size:22px;font-weight:300;letter-spacing:-.4px;margin-bottom:8px;text-align:center}
.panel-sub{font-size:14px;color:var(--muted);text-align:center;line-height:1.65;margin-bottom:28px}
.upload-zone{border:1.5px dashed var(--glass-border);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden;background:var(--glass);margin-bottom:10px}
.upload-zone:hover{border-color:rgba(255,255,255,0.2);background:var(--glass-hover)}
.upload-zone.has-file{border-color:var(--green);border-style:solid}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:28px;color:var(--muted);display:block;margin-bottom:10px}
.upload-label{font-size:13px;color:var(--muted)}.upload-label strong{color:var(--chrome);display:block;margin-bottom:3px}
.upload-filename{font-size:12px;color:var(--green);margin-top:8px}
.field{width:100%;background:var(--glass);border:1px solid var(--glass-border);border-radius:11px;color:var(--text);font-size:14px;padding:13px 16px;outline:none;font-family:inherit;transition:border-color .2s;-webkit-appearance:none;margin-bottom:10px}
.field:focus{border-color:rgba(255,255,255,0.2)}
.field::placeholder{color:var(--muted)}
.btn{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:inherit}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.35;cursor:not-allowed}
.upload-msg{font-size:13px;min-height:18px;margin-top:8px;text-align:center}
.upload-msg.err{color:var(--red)}.upload-msg.ok{color:var(--green)}

/* Chat panel */
#chat-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.chat-header{padding:12px 20px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:12px;background:rgba(8,8,8,0.6);backdrop-filter:blur(10px)}
.avatar-initial{width:36px;height:36px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--chrome);flex-shrink:0}
.chat-header-info{flex:1}
.chat-name{font-size:14px;font-weight:500;color:var(--chrome)}
.chat-status{font-size:12px;color:var(--green)}
.chat-reset{color:var(--muted);font-size:12px;cursor:pointer;text-decoration:none;transition:color .2s}
.chat-reset:hover{color:var(--text)}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.messages::-webkit-scrollbar{width:0}
.bubble{max-width:78%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.65;word-break:break-word}
.bubble.user{align-self:flex-end;background:rgba(255,255,255,0.08);border:1px solid var(--glass-border);color:var(--text);border-bottom-right-radius:4px}
.bubble.assistant{align-self:flex-start;background:var(--glass);border:1px solid var(--glass-border);color:var(--text);border-bottom-left-radius:4px}
.bubble.typing{color:var(--muted);font-style:italic}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--glass-border);display:flex;gap:10px;align-items:flex-end;background:rgba(8,8,8,0.6);backdrop-filter:blur(10px)}
textarea#msg-input{flex:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:11px;color:var(--text);font-size:14px;padding:12px 14px;outline:none;font-family:inherit;resize:none;min-height:44px;max-height:120px;line-height:1.5;transition:border-color .2s;-webkit-appearance:none}
textarea#msg-input:focus{border-color:rgba(255,255,255,0.2)}
textarea#msg-input::placeholder{color:var(--muted)}
.send-btn{width:44px;height:44px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.send-icon{width:18px;height:18px;fill:#000}
.limit-bar{background:rgba(248,113,113,0.08);border-top:1px solid rgba(248,113,113,0.12);padding:12px 20px;text-align:center;font-size:13px;color:var(--red);display:none}

@media(max-width:480px){
  .bubble{max-width:90%}
  .messages{padding:14px}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Chronis</a>
  <span class="nav-badge">Text Demo</span>
</nav>

<div class="app">

  <!-- Upload panel -->
  <div id="upload-panel">
    <div class="panel-inner">
      <div class="panel-title">Start a conversation</div>
      <p class="panel-sub">Upload a video or audio of someone, give them a name, and start talking.</p>

      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="video/*,audio/*" onchange="onFileChange(this)">
        <span class="upload-icon">◎</span>
        <div class="upload-label"><strong>Upload video or audio</strong>Any format · up to 1GB</div>
        <div class="upload-filename" id="upload-filename"></div>
      </div>

      <input class="field" type="text" id="person-name" placeholder="Their name (e.g. Mom, Grandpa)">
      <button class="btn" id="start-btn" onclick="startDemo()" disabled>Start Conversation</button>
      <div class="upload-msg" id="upload-msg"></div>
    </div>
  </div>

  <!-- Chat panel -->
  <div id="chat-panel">
    <div class="chat-header">
      <div class="avatar-initial" id="avatar-initial">?</div>
      <div class="chat-header-info">
        <div class="chat-name" id="chat-name">—</div>
        <div class="chat-status">Online</div>
      </div>
      <a class="chat-reset" onclick="resetDemo()">New chat</a>
    </div>
    <div class="messages" id="messages"></div>
    <div class="limit-bar" id="limit-bar">
      You've reached the free message limit.
      <a href="/live" style="color:var(--red);margin-left:6px;text-decoration:underline">Try the Live V2 demo →</a>
    </div>
    <div class="chat-input-row">
      <textarea id="msg-input" placeholder="Type a message…" rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg class="send-icon" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
let sessionId = null;
let personName = '';
let isTyping = false;

function onFileChange(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('upload-filename').textContent = file.name;
  document.getElementById('upload-zone').classList.add('has-file');
  checkReady();
}

document.getElementById('person-name').addEventListener('input', checkReady);

function checkReady() {
  const hasFile = !!document.getElementById('file-input').files[0];
  const hasName = document.getElementById('person-name').value.trim().length > 0;
  document.getElementById('start-btn').disabled = !(hasFile && hasName);
}

async function startDemo() {
  const btn  = document.getElementById('start-btn');
  const msg  = document.getElementById('upload-msg');
  const file = document.getElementById('file-input').files[0];
  personName = document.getElementById('person-name').value.trim();

  btn.disabled = true; btn.textContent = 'Analyzing…';
  msg.className = 'upload-msg'; msg.textContent = '';

  const form = new FormData();
  form.append('file', file);
  form.append('person_name', personName);

  try {
    const r = await fetch('/api/analyze', {method:'POST', body:form});
    const d = await r.json();

    if (!r.ok || d.error) {
      msg.className = 'upload-msg err';
      msg.textContent = d.error || 'Analysis failed. Please try again.';
      btn.disabled = false; btn.textContent = 'Start Conversation';
      return;
    }

    sessionId = d.session_id;
    document.getElementById('chat-name').textContent    = personName;
    document.getElementById('avatar-initial').textContent = personName.charAt(0).toUpperCase();

    document.getElementById('upload-panel').style.display = 'none';
    document.getElementById('chat-panel').style.display   = 'flex';

    appendMessage('assistant', `Hi, it's ${personName}. I'm so glad you reached out.`);

  } catch(e) {
    msg.className = 'upload-msg err'; msg.textContent = 'Network error. Please try again.';
    btn.disabled = false; btn.textContent = 'Start Conversation';
  }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || isTyping || !sessionId) return;

  input.value = ''; autoResize(input);
  appendMessage('user', text);
  isTyping = true;
  document.getElementById('send-btn').disabled = true;

  const typingEl = appendMessage('assistant', '…', true);

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId, message: text}),
    });
    const d = await r.json();

    typingEl.remove();
    isTyping = false;
    document.getElementById('send-btn').disabled = false;

    if (r.status === 402) {
      document.getElementById('limit-bar').style.display = 'block';
      return;
    }

    if (!r.ok || d.error) {
      appendMessage('assistant', d.error || 'Something went wrong.');
      return;
    }

    appendMessage('assistant', d.reply);

    if (d.limit_reached) {
      document.getElementById('limit-bar').style.display = 'block';
    }

  } catch(e) {
    typingEl.remove();
    isTyping = false;
    document.getElementById('send-btn').disabled = false;
    appendMessage('assistant', 'Network error. Please try again.');
  }
}

function appendMessage(role, text, isTypingMsg=false) {
  const msgs = document.getElementById('messages');
  const el   = document.createElement('div');
  el.className = 'bubble ' + role + (isTypingMsg ? ' typing' : '');
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function resetDemo() {
  sessionId = null; personName = '';
  document.getElementById('messages').innerHTML = '';
  document.getElementById('upload-panel').style.display = '';
  document.getElementById('chat-panel').style.display   = 'none';
  document.getElementById('limit-bar').style.display    = 'none';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('start-btn').textContent = 'Start Conversation';
  document.getElementById('upload-msg').textContent = '';
  document.getElementById('upload-filename').textContent = '';
  document.getElementById('upload-zone').classList.remove('has-file');
  document.getElementById('file-input').value = '';
  document.getElementById('person-name').value = '';
}
</script>
</body>
</html>

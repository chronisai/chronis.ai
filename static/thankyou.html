<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list — Chronis</title>
<meta name="description" content="Welcome to the Chronis waitlist. We'll email you when your access is ready.">
<link rel="canonical" href="https://chronis.in/thankyou">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060606;--sf:rgba(255,255,255,.035);--bd:rgba(255,255,255,.08);--tx:#ede9e2;--mu:rgba(237,233,226,.4);--ch:rgba(237,233,226,.75);--ne:#5eead4;--gr:#4ade80;--fd:'Cormorant Garamond',Georgia,serif;--fb:'Plus Jakarta Sans',system-ui,sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;text-align:center;position:relative;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4}
.wrap{position:relative;z-index:1;max-width:480px;width:100%}
.check-ring{width:72px;height:72px;border-radius:50%;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 36px;position:relative;animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.check-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(74,222,128,.07);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:.2;transform:scale(1.15)}}
.check-icon{font-size:28px;color:var(--gr)}
h1{font-family:var(--fd);font-size:clamp(36px,6vw,56px);font-weight:300;letter-spacing:-.5px;line-height:1.1;margin-bottom:16px;animation:fadeUp .7s .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.sub{font-size:15px;color:var(--mu);line-height:1.78;margin-bottom:36px;font-weight:300;animation:fadeUp .7s .3s ease both}
.pos-card{display:inline-block;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px 32px;margin-bottom:44px;animation:fadeUp .7s .4s ease both}
.pos-num{font-family:var(--fd);font-size:38px;font-weight:300;color:var(--ch);display:block;line-height:1;margin-bottom:4px}
.pos-label{font-size:12px;color:var(--mu);letter-spacing:.5px}
.links{display:flex;flex-direction:column;gap:10px;animation:fadeUp .7s .5s ease both}
.la{padding:14px 22px;border-radius:10px;font-size:14px;text-decoration:none;font-weight:500;font-family:var(--fb);transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.lp{background:var(--tx);color:#000}
.lp:hover{opacity:.88;transform:translateY(-1px)}
.lg2{background:var(--sf);border:1px solid var(--bd);color:var(--mu)}
.lg2:hover{border-color:rgba(255,255,255,.18);color:var(--tx)}
.radial{position:fixed;top:-20vh;left:50%;transform:translateX(-50%);width:80vw;height:60vh;background:radial-gradient(ellipse,rgba(74,222,128,.04) 0%,transparent 70%);pointer-events:none;z-index:0;animation:breathe 7s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
footer{position:fixed;bottom:0;left:0;right:0;padding:16px;text-align:center;font-size:12px;color:rgba(237,233,226,.15);z-index:1}
</style>
</head>
<body>
<div class="radial"></div>
<canvas id="c"></canvas>
<div class="wrap">
  <div class="check-ring"><span class="check-icon">✓</span></div>
  <h1>You're on the list.</h1>
  <p class="sub">We'll email you the moment your access is ready.<br>Usually within a few days.</p>
  <div class="pos-card">
    <span class="pos-num" id="pos">—</span>
    <span class="pos-label">on the waitlist</span>
  </div>
  <div class="links">
    <a href="/demo" class="la lp">Try the text demo now →</a>
    <a href="/" class="la lg2">Back to home</a>
  </div>
</div>
<footer>© 2026 Chronis</footer>
<script>
fetch('/api/waitlist/count').then(r=>r.json()).then(d=>{
  const n=Math.max(93,d.count||0);
  document.getElementById('pos').textContent='#'+n;
}).catch(()=>{});
(function(){
  const c=document.getElementById('c'),ctx=c.getContext('2d');
  let W,H,P=[];
  function R(){W=c.width=innerWidth;H=c.height=innerHeight}R();addEventListener('resize',R);
  for(let i=0;i<60;i++)P.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()+.3,vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.12,a:Math.random()*.3+.08,da:(Math.random()-.5)*.002});
  function draw(){ctx.clearRect(0,0,W,H);P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.a+=p.da;if(p.a<.05||p.a>.4)p.da*=-1;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.a})`;ctx.fill()});requestAnimationFrame(draw)}
  draw();
})();
</script>
</body>
</html>

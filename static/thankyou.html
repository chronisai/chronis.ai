<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronis — You're on the list</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);--text:#f0eeea;--muted:rgba(255,255,255,0.38);--chrome:rgba(255,255,255,0.72);--green:#4ade80}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;text-align:center}
body::before{content:'';position:fixed;top:-20vh;left:50%;transform:translateX(-50%);width:60vw;height:50vh;background:radial-gradient(ellipse,rgba(74,222,128,0.04) 0%,transparent 70%);pointer-events:none}
.checkmark{width:56px;height:56px;border-radius:50%;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:22px}
h1{font-size:clamp(28px,5vw,42px);font-weight:200;letter-spacing:-1px;margin-bottom:14px}
.sub{font-size:15px;color:var(--muted);line-height:1.75;max-width:420px;margin:0 auto 40px}
.position-badge{display:inline-block;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:12px 24px;font-size:13px;color:var(--muted);margin-bottom:40px}
.position-badge strong{color:var(--chrome);font-size:20px;font-weight:300;display:block;margin-bottom:2px}
.links{display:flex;flex-direction:column;gap:10px;max-width:300px;margin:0 auto}
.link-btn{padding:13px 20px;border-radius:11px;font-size:14px;text-decoration:none;transition:opacity .2s;font-weight:500}
.link-primary{background:#fff;color:#000}
.link-primary:hover{opacity:.9}
.link-ghost{background:var(--glass);border:1px solid var(--glass-border);color:var(--muted)}
.link-ghost:hover{border-color:rgba(255,255,255,0.18);color:var(--text)}
footer{position:fixed;bottom:0;left:0;right:0;padding:16px;text-align:center;font-size:12px;color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="checkmark">✓</div>
<h1>You're on the list.</h1>
<p class="sub">We'll email you the moment your access is ready. Usually within a few days.</p>
<div class="position-badge">
  <strong id="pos">—</strong>
  on the waitlist
</div>
<div class="links">
  <a href="/demo" class="link-btn link-primary">Try the text demo now →</a>
  <a href="/" class="link-btn link-ghost">Back to home</a>
</div>
<footer>© 2026 Chronis</footer>
<script>
fetch('/api/waitlist/count').then(r=>r.json()).then(d=>{
  const n=d.count||'—';
  document.getElementById('pos').textContent='#'+n;
}).catch(()=>{});
</script>
</body>
</html>

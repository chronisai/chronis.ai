[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn main_v2:app --host 0.0.0.0 --port $PORT --workers 1 --ws websockets"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Single worker — we use asyncio concurrency, not process-level parallelism.
# Multiple workers would create separate _live_sessions dicts with no shared state.
# If you need horizontal scale: add Redis-backed session registry first.
